services:
  core:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.core
    # Caddy is the only host-facing HTTP entrypoint (browser on :443, device
    # paths on :80). The core's HTTP is in-network only as core:8080. MQTT is
    # published directly for devices.
    ports:
      - "1883:1883"
    expose:
      - "8080"
    environment:
      ESPM_WORKER_TOKEN: ${ESPM_WORKER_TOKEN:?set a strong ESPM_WORKER_TOKEN}
      ESPM_ADMIN_USER: ${ESPM_ADMIN_USER:-admin}
      ESPM_ADMIN_PASSWORD: ${ESPM_ADMIN_PASSWORD:?set a strong ESPM_ADMIN_PASSWORD}
      # Device-reachable http base for OTA firmware URLs (devices cannot do TLS).
      ESPM_PUBLIC_URL: ${ESPM_PUBLIC_URL:-}
      # Browser origin (https via Caddy) — drives Secure cookies.
      ESPM_BROWSER_URL: ${ESPM_BROWSER_URL:-}
      ESPM_SIGNER_URL: http://signer:8090
      ESPM_SIGNER_TOKEN: ${ESPM_SIGNER_TOKEN:?set a strong ESPM_SIGNER_TOKEN}
    volumes:
      - core-data:/app/data
    depends_on:
      - signer
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    mem_limit: 512m
    pids_limit: 256

  builder:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.builder
    environment:
      ESPM_CORE_URL: http://core:8080
      ESPM_WORKER_TOKEN: ${ESPM_WORKER_TOKEN:?set a strong ESPM_WORKER_TOKEN}
    volumes:
      - builder-data:/app/data
      - platformio-cache:/home/builder/.platformio
    depends_on:
      - core
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    mem_limit: 2g
    cpus: 2.0
    pids_limit: 1024

  signer:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.signer
    environment:
      ESPM_SIGNER_TOKEN: ${ESPM_SIGNER_TOKEN:?set a strong ESPM_SIGNER_TOKEN}
    volumes:
      - signer-data:/app/data
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    mem_limit: 128m
    pids_limit: 128

  caddy:
    image: caddy:2-alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    depends_on:
      - core
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true

volumes:
  core-data:
  builder-data:
  platformio-cache:
  signer-data:
  caddy-data:
  caddy-config:
