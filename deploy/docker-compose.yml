services:
  core:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.core
    ports:
      - "8080:8080"
      - "1883:1883"
    environment:
      ESPM_WORKER_TOKEN: ${ESPM_WORKER_TOKEN:?set a strong ESPM_WORKER_TOKEN}
      ESPM_ADMIN_USER: ${ESPM_ADMIN_USER:-admin}
      ESPM_ADMIN_PASSWORD: ${ESPM_ADMIN_PASSWORD:-}
      ESPM_SIGNER_URL: http://signer:8090
      ESPM_SIGNER_TOKEN: ${ESPM_SIGNER_TOKEN:?set a strong ESPM_SIGNER_TOKEN}
    volumes:
      - core-data:/app/data
    depends_on:
      - signer
    restart: unless-stopped

  builder:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.builder
    environment:
      ESPM_CORE_URL: http://core:8080
      ESPM_WORKER_TOKEN: ${ESPM_WORKER_TOKEN:?set a strong ESPM_WORKER_TOKEN}
    volumes:
      - builder-data:/app/data
      - platformio-cache:/root/.platformio
    depends_on:
      - core
    restart: unless-stopped

  signer:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.signer
    environment:
      ESPM_SIGNER_TOKEN: ${ESPM_SIGNER_TOKEN:?set a strong ESPM_SIGNER_TOKEN}
    volumes:
      - signer-data:/app/data
    restart: unless-stopped

volumes:
  core-data:
  builder-data:
  platformio-cache:
  signer-data:
