<!doctype html>
<html lang="pt-br">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>ESPManager — Novo dispositivo</title>
  <link rel="stylesheet" href="/static/app.css">
</head>
<body>
  {{template "nav"}}
  <main>
    <h1>Token de enrollment</h1>
    <p class="warn">Use este token no primeiro boot do dispositivo. Ele é de uso único e expira em breve.</p>
    <dl class="secret">
      <dt>Claim token</dt>
      <dd><code>{{.Token}}</code></dd>
      <dt>Expira em</dt>
      <dd>{{.ExpiresAt}}</dd>
    </dl>
    <p>O dispositivo troca este token por credenciais MQTT em <code>POST /v1/claim</code> com <code>{device_id, token}</code>.</p>
    <p><a href="/">Voltar para dispositivos</a></p>
  </main>
</body>
</html>
