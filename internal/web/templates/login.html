{{define "login"}}<!doctype html>
<html lang="pt-br">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Sign in · ESPManager</title>
  <link rel="stylesheet" href="/static/tokens.css">
  <link rel="stylesheet" href="/static/app.css">
  <script src="/static/app.js" defer></script>
</head>
<body>
  <div class="login-wrap">
    <div class="brand"><span class="brand-mark">E</span> ESPManager</div>
    <div class="login-card">
      {{if .SetupRequired}}
        <div class="banner" data-variant="warning" role="alert">
          <span>Set <code class="mono">ESPM_ADMIN_PASSWORD</code> and restart the server to enable sign-in.</span>
        </div>
      {{else}}
        {{if .Error}}<div class="banner" data-variant="danger" role="alert" style="margin-bottom:var(--sp-4)"><span>{{.Error}}</span></div>{{end}}
        <form method="post" action="/login">
          <div class="field">
            <label for="password">Password</label>
            <div class="pw-row">
              <input id="password" name="password" type="password" autocomplete="current-password" autofocus required>
              <button class="btn ghost" type="button" data-toggle-pw="password" aria-pressed="false" aria-label="Show password">Show</button>
            </div>
          </div>
          <button class="btn primary" type="submit">Sign in</button>
        </form>
      {{end}}
    </div>
  </div>
</body>
</html>{{end}}
